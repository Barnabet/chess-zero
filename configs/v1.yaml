net: {channels: 128, blocks: 6, se_ratio: 4, precision: bf16}
selfplay:
  num_games: 2048  # locked: ~1070 moves/s, reproduced twice (Phase 1, 2026-07-08)
  sims_full: 32
  sims_cheap: 8
  full_search_prob: 0.25
  steps_per_generation: 16
train:
  batch_size: 1024
  lr: 0.00022  # 2nd 3x cut at ~262k steps: policy loss flat ~2.08 for 300 gens, 4 straight par gates after gen 1979 (1st cut at 125k: 2e-3 -> 6.6e-4)
  steps_per_generation: 128  # ~4x sample reuse vs 32k examples/gen at b2048
  buffer_capacity: 1000000
  min_buffer: 100000
  resign_min_train_steps: 999999999  # disabled for this run: windowed holdout FP was 74->64% over steps 4k-18k (weak conversion, ~45% draws) — improving ~3pp/h, nowhere near the 5% bar; shadow holdout stats keep accumulating
gating: {games: 120, promote_threshold: 0.53}
seed: 0
run_dir: runs/v1
checkpoint_every_min: 15.0
# measured: steady-state gate ~131s worst-case, generation ~35s at b2048
# -> 30 gens keeps gating ~11% overhead, ~17 min between gates
gate_every_generations: 30
